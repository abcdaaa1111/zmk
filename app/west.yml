manifest:
  remotes:
    - name: zephyrproject-rtos
      url-base: https://github.com/zephyrproject-rtos
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
    - name: abcdaaa1111
      url-base: https://github.com/abcdaaa1111
    - name: cherry-embedded
      url-base: https://github.com/cherry-embedded
  projects:
    - name: zephyr
      remote: abcdaaa1111
      revision: main
      import:
        name-blocklist:
          - ci-tools
          - hal_altera
          - hal_cypress
          - hal_infineon
          - hal_microchip
          - hal_nxp
          - hal_openisa
          - hal_xtensa
          - hal_st
          - hal_ti
          - loramac-node
          - mcuboot
          - mcumgr
          - net-tools
          - openthread
          - edtt
          - trusted-firmware-m
    - name: hal_stm32
      revision: 4fcc3a3f32abe1c4cb76d9d1cef967728dd03908
      path: modules/hal/stm32
      remote: zmkfirmware
      groups:
        - hal
    - name: lvgl
      revision: f1db87ee98f1810328a8419572fa42a3b5f352ae
      path: modules/lib/gui/lvgl
      remote: zmkfirmware
    - name: zmk-studio-messages
      revision: 6cb4c283e76209d59c45fbcb218800cd19e9339d
      path: modules/msgs/zmk-studio-messages
      remote: zmkfirmware
    - name: hal_sifli
      revision: 86fa0e9433fda1a760e0077c19b8407ecceea2f9
      path: modules/hal/sifli
      remote: zephyrproject-rtos
      groups:
        - hal
    - name: CherryUSB
      revision: master
      remote: abcdaaa1111
      path: modules/lib/usb/CherryUSB
      groups:
        - usb
  group-filter: [+optional]
  self:
    west-commands: scripts/west-commands.yml
